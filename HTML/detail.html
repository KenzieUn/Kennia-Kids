<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Detail Produk - Kennia Kids</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../CSS/style.css" />
  </head>

  <body>
    <!-- NAVBAR -->

    <header class="navbar">
      <div class="container navbar-content">
        <div class="logo">
          <img src="../img/logo.png" alt="Logo" />
          <h2>Kennia Kids</h2>
        </div>

        <nav>
          <ul class="nav-menu">
            <li><a href="indeks.html">Beranda</a></li>
            <li><a href="produk.html" class="active">Produk</a></li>
            <li><a href="#">Kategori</a></li>
            <li><a href="#">Kontak</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- DETAIL -->

    <section class="detail-page">
      <div class="container">
        <div class="detail-container">
          <!-- IMAGE -->

          <div class="detail-image">Image Produk</div>

          <!-- INFO -->

          <div class="detail-info">
            <h1>Dress Anak Pastel</h1>

            <h2>Rp 85.000</h2>

            <p class="detail-desc">
              Dress anak dengan bahan lembut, nyaman digunakan sehari-hari,
              cocok untuk acara santai maupun jalan-jalan.
            </p>

            <!-- SIZE -->

            <div class="detail-size">
              <h3>Pilih Ukuran</h3>

              <div class="size-list">
                <button>S</button>
                <button>M</button>
                <button>L</button>
                <button>XL</button>
              </div>
            </div>

            <!-- BUTTON -->

            <div class="detail-action">
              <button class="btn-buy">Beli Sekarang</button>

              <button class="btn-cart">+ Keranjang</button>
            </div>
          </div>
        </div>
      </div>
    </section>
    <script src="../JS/script.js"></script>
  </body>
</html>
