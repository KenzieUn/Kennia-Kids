<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Checkout - Kennia Kids</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../CSS/style.css" />
  </head>

  <body>
    <!-- NAVBAR -->

    <header class="navbar">
      <div class="container navbar-content">
        <div class="logo">
          <img src="../img/logo.png" alt="Logo" />
          <h2>Kennia Kids</h2>
        </div>

        <nav>
          <ul class="nav-menu">
            <li><a href="indeks.html">Beranda</a></li>
            <li><a href="produk.html">Produk</a></li>
            <li><a href="keranjang.html">Keranjang</a></li>
            <li><a href="#" class="active">Checkout</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- CHECKOUT -->

    <section class="checkout-page">
      <div class="container">
        <div class="section-title">
          <h2>Checkout</h2>

          <p>Lengkapi data pesanan Anda</p>
        </div>

        <div class="checkout-container">
          <!-- FORM -->

          <form class="checkout-form">
            <div class="form-group">
              <label>Nama Lengkap</label>

              <input type="text" placeholder="Masukkan nama lengkap" />
            </div>

            <div class="form-group">
              <label>No WhatsApp</label>

              <input type="text" placeholder="08xxxxxxxxxx" />
            </div>

            <div class="form-group">
              <label>Alamat Lengkap</label>

              <textarea
                rows="5"
                placeholder="Masukkan alamat lengkap"
              ></textarea>
            </div>

            <div class="form-group">
              <label>Metode Pembayaran</label>

              <select>
                <option>-- Pilih Pembayaran --</option>

                <option>Transfer Bank</option>

                <option>E-Wallet</option>

                <option>COD</option>
              </select>
            </div>
          </form>

          <!-- SUMMARY -->

          <div class="checkout-summary">
            <h3>Ringkasan Belanja</h3>

            <div class="summary-item">
              <span>Dress Anak Pastel</span>

              <span>Rp 85.000</span>
            </div>

            <div class="summary-item">
              <span>Kaos Anak Premium</span>

              <span>Rp 130.000</span>
            </div>

            <hr />

            <div class="summary-total">
              <h3>Total</h3>

              <h2>Rp 215.000</h2>
            </div>

            <button class="btn-checkout">Buat Pesanan</button>
          </div>
        </div>
      </div>
    </section>
    <script src="../JS/script.js"></script>
  </body>
</html>
